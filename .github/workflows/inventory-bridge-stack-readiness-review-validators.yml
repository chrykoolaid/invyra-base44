name: Inventory Bridge Stack Readiness Review Validators

on:
  pull_request:
    branches:
      - phase-1d-d-aj-stack-audit-manifest-projection
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge-stack-readiness-review-validators:
    name: Bridge stack readiness review validators only
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Inventory bridge stack readiness review and write report
        run: node scripts/write-inventory-bridge-stack-report.mjs

      - name: Upload Inventory bridge validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-bridge-stack-readiness-review-report
          path: bridge-validation-reports/inventory-bridge-stack-report.json
          if-no-files-found: warn
